<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#07040f" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Heebo:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="./css/app.css" />
  <title>Spot Finder • דמדומים</title>

  <style>
    /* ── Layout: map fixed top, content scrolls below ── */
    html, body { height: 100%; overflow: hidden; }

    .spot-layout {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── Map ── */
    #spotMap {
      flex: 0 0 42vh;
      min-height: 220px;
      max-height: 340px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Leaflet dark overrides */
    .leaflet-container { background: #07040f; font-family: 'Heebo', sans-serif; }
    .leaflet-tile-pane { filter: brightness(1.05) saturate(0.75); }

    .spot-popup .leaflet-popup-content-wrapper {
      background: rgba(14,8,28,.96);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(240,180,60,.22);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
      color: #f4e8d4;
      padding: 0;
    }
    .spot-popup .leaflet-popup-content { margin: 14px 16px; }
    .spot-popup .leaflet-popup-tip     { background: rgba(14,8,28,.96); }
    .spot-popup .leaflet-popup-close-button { color: rgba(244,232,212,.4) !important; font-size: 18px !important; top: 8px !important; left: 10px !important; right:auto !important; }

    .spot-tooltip {
      background: rgba(14,8,28,.9);
      border: 1px solid rgba(240,180,60,.22);
      border-radius: 8px;
      color: #ffd46a;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
    }

    /* ── Scrollable panel below map ── */
    .spot-panel {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
      position: relative;
      z-index: 2;
    }

    .spot-panel::-webkit-scrollbar { width: 4px; }
    .spot-panel::-webkit-scrollbar-track { background: transparent; }
    .spot-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,.12); border-radius: 99px; }

    .panel-inner {
      max-width: 520px;
      margin: 0 auto;
      padding: 14px 14px 60px;
    }

    /* ── Top bar (inside panel) ── */
    .spot-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 6px;
      max-width: 520px;
      margin: 0 auto;
    }
    .spot-brand { flex: 1; }
    .spot-brand__title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 600; color: var(--gold2); }
    .spot-brand__sub   { font-size: 11px; color: var(--muted); }

    .back-btn {
      text-decoration: none;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      white-space: nowrap;
    }
    .back-btn:hover { color: var(--text); border-color: var(--border-lit); }

    /* ── Controls card ── */
    .controls-card {
      background: linear-gradient(145deg,rgba(255,255,255,.042),rgba(255,255,255,.016));
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .controls-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px; font-weight: 600;
      color: var(--gold); margin-bottom: 12px;
    }
    .controls-grid { display: flex; flex-direction: column; gap: 10px; }

    /* ── List items ── */
    .spot-list-item {
      transition: border-color .25s, transform .15s;
    }
    .spot-list-item:hover { transform: translateX(-2px); }
    .spot-list-item:active { transform: scale(.98); }

    /* ── Empty / loading state ── */
    .map-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: rgba(244,232,212,.35);
      font-size: 13px;
      gap: 8px;
      pointer-events: none;
      z-index: 2;
    }
    .map-placeholder-icon { font-size: 36px; }

    #mapSection { display: none; }
    #mapSection.visible { display: block; }

    /* ── Result summary pill ── */
    #resultSummary {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      min-height: 18px;
    }

    /* Source hint */
    .source-hint {
      font-size: 11px;
      color: rgba(244,232,212,.28);
      text-align: center;
      margin-top: 6px;
      margin-bottom: 14px;
    }
  </style>
</head>
<body>
<div class="spot-layout">

  <!-- ══ MAP (קבועה בחלק העליון) ══ -->
  <div id="spotMapWrap" style="position:relative;flex:0 0 42vh;min-height:220px;max-height:340px;">
    <div id="spotMap"></div>
    <div class="map-placeholder" id="mapPlaceholder">
      <span class="map-placeholder-icon">🔭</span>
      <span>חפש נקודות תצפית — המפה תיטען כאן</span>
    </div>
  </div>

  <!-- ══ SCROLLABLE PANEL ══ -->
  <div class="spot-panel">

    <!-- Top bar -->
    <div class="spot-topbar">
      <div class="spot-brand">
        <div class="spot-brand__title">🔭 Spot Finder</div>
        <div class="spot-brand__sub">נקודות תצפית לשקיעה מושלמת</div>
      </div>
      <a href="./index.html" class="back-btn">← חזור</a>
    </div>

    <div class="panel-inner">

      <!-- Hidden location elements for app.js compatibility -->
      <span id="locInfo" style="display:none"></span>
      <span id="locCoords" style="display:none"></span>
      <button id="btnGps" style="display:none"></button>

      <div class="city-search-row" style="margin-bottom:10px">
        <input class="city-input" id="placeInput" type="text" placeholder="חפש עיר / כתובת..."
               inputmode="search"
               onkeydown="if(event.key==='Enter') document.getElementById('btnSearch').click()" />
        <button class="city-search-btn" id="btnSearch">🔍</button>
      </div>

      <!-- Controls -->
      <div class="controls-card">
        <div class="controls-title">הגדרות חיפוש</div>
        <div class="controls-grid">
          <div class="field">
            <span class="field__label">רדיוס חיפוש</span>
            <input class="range" id="radiusKm" type="range" min="2" max="30" value="12" step="1" />
            <span class="pill"><span id="radiusVal">12</span> ק"מ</span>
          </div>
          <div class="field">
            <span class="field__label">תוצאות</span>
            <select class="select" id="topN">
              <option value="5">5 נקודות</option>
              <option value="8" selected>8 נקודות</option>
              <option value="12">12 נקודות</option>
              <option value="20">20 נקודות</option>
            </select>
          </div>
        </div>
        <button class="btn-primary" id="btnFind" style="margin-top:10px;padding:10px 20px;width:auto">🔭 מצא נקודות</button>
      </div>

      <!-- Results -->
      <div id="resultsCard" style="display:none">
        <div id="resultSummary"></div>
        <div class="list" id="results"></div>
        <div class="source-hint">נתוני מיקום: OpenStreetMap Overpass API • גובה: Open-Meteo</div>
      </div>

    </div>
  </div><!-- /spot-panel -->
</div><!-- /spot-layout -->

<script src="./js/app.js"></script>
<script src="./js/favorites.js"></script>
<script src="./js/spotfinder.js"></script>

<script>
  // Hide placeholder once map loads
  window.__onMapInit = function() {
    const ph = document.getElementById('mapPlaceholder');
    if (ph) ph.style.display = 'none';
  };
</script>
</body>
</html>
