<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#50301d" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/app.css" />
  <title>Twilight — Spot Finder</title>
</head>
<body class="theme-spot">
<div class="spot-layout">
  <header class="hero hero--compact">
    <div class="hero__media"><img src="./assets/backgrounds/hero-bright-pastel.png" alt="Pastel sunset landscape" /></div>
    <div class="hero__overlay"></div>
    <div class="hero__top hero__top--spot">
      <a class="hero-chip nav-cta" href="./index.html">← Forecast</a>
      <div class="hero__logo-badge"><img src="./icons/icon-192.png" alt="Twilight logo"></div>
    </div>
    <div class="hero__content hero__content--compact">
      <div class="eyebrow">SPOT FINDER</div>
      <h1>Sunset spots</h1>
      <p>נקודות תצפית לשקיעה מושלמת לפי מיקום, מרחק, ואיכות אופק.</p>
      <div class="spot-hero-actions">
        <button class="hero-chip" id="btnGps" title="GPS">Use GPS</button>
        <button class="hero-chip" id="btnFind">Find spots</button>
      </div>
    </div>
  </header>

  <main class="spot-main">
    <section class="card card--search search-card">
      <div class="location-badge">
        <div class="location-badge__icon">🧭</div>
        <div class="location-copy">
          <span class="location-label">Search center</span>
          <strong id="locInfo">לא נבחר מיקום</strong>
          <span id="locCoords">חפש עיר או הפעל GPS</span>
        </div>
      </div>
      <div class="city-search-row city-search-row--v2 city-search-row--spot">
        <input class="city-input" id="placeInput" type="text" placeholder="חפש עיר / כתובת..." inputmode="search" onkeydown="if(event.key==='Enter') document.getElementById('btnSearch').click()" />
        <button class="city-search-btn" id="btnSearch">🔎</button>
      </div>
    </section>

    <section class="map-shell" style="margin-top:16px;">
      <div id="spotMap">
        <div class="map-placeholder" id="mapPlaceholder">
          <span class="map-placeholder-icon">🌇</span>
          <span>המפה תיטען כאן אחרי חיפוש</span>
        </div>
      </div>
    </section>

    <div class="spot-grid" style="margin-top:16px;">
      <section class="controls-card">
        <div class="controls-title">Search settings</div>
        <div class="controls-grid">
          <div class="field">
            <span class="field__label">Radius</span>
            <input class="range" id="radiusKm" type="range" min="2" max="30" value="12" step="1" />
            <span class="pill"><span id="radiusVal">12</span> km</span>
          </div>
          <div class="field">
            <span class="field__label">Results</span>
            <select class="select" id="topN">
              <option value="5">5 spots</option>
              <option value="8" selected>8 spots</option>
              <option value="12">12 spots</option>
              <option value="20">20 spots</option>
            </select>
          </div>
        </div>
        <div style="font-size:12px;color:var(--muted);margin:10px 0 6px">Spot type</div>
        <div class="type-filters">
          <label class="type-chip checked"><input type="checkbox" class="type-filter" value="viewpoint" checked>🔭 Viewpoint</label>
          <label class="type-chip checked"><input type="checkbox" class="type-filter" value="peak" checked>⛰️ Peak</label>
          <label class="type-chip checked"><input type="checkbox" class="type-filter" value="hill" checked>🏔️ Hill</label>
          <label class="type-chip checked"><input type="checkbox" class="type-filter" value="tower" checked>🗼 Tower</label>
          <label class="type-chip"><input type="checkbox" class="type-filter" value="beach">🏖️ Coast</label>
          <label class="type-chip"><input type="checkbox" class="type-filter" value="park">🌳 Park</label>
        </div>
      </section>

      <div id="savedSpots" class="controls-card" style="display:none"></div>
      <section id="resultsCard" class="results-card" style="display:none">
        <div id="resultSummary"></div>
        <div id="results"></div>
        <div class="source-hint">OpenStreetMap • Open-Meteo elevation • OSRM routing</div>
      </section>
    </div>
  </main>
</div>

<nav class="bottom-nav" aria-label="Primary">
  <a class="bottom-nav__item" href="./index.html"><strong>☼</strong><span>Forecast</span></a>
  <a class="bottom-nav__item is-active" href="./spot.html"><strong>◌</strong><span>Spots</span></a>
  <a class="bottom-nav__item" href="./privacy-policy.html"><strong>⋯</strong><span>Privacy</span></a>
</nav>

<script src="./js/app.js"></script>
<script src="./js/sun.js"></script>
<script src="./js/favorites.js"></script>
<script src="./js/spotfinder.js"></script>
<script>
  document.querySelectorAll('.type-chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('checked'));
  });
</script>
</body>
</html>
